name: Build iOS IPA
on:
  workflow_dispatch:
  push:
    branches: [main, master]
jobs:
  build-ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Allow HTTP API
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsArbitraryLoads true" "$PLIST" 2>/dev/null || true

      - name: Build unsigned App
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          APP=$(find ios/App/build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          test -n "$APP" || (echo "No .app found" && exit 1)
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          zip -qr 证件照客服.ipa Payload
          ls -lh 证件照客服.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: 证件照客服-ipa
          path: 证件照客服.ipa
